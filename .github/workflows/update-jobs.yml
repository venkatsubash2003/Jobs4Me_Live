name: Update jobs

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-jobs
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      FETCH_WORKERS: "24"
      WORKDAY_FETCH_WORKERS: "2"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Update README and website jobs
        run: python -m jobs4me.update_readme

      - name: Commit generated job updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update matching jobs"
          file_pattern: |
            README.md
            docs/index.html
            docs/jobs.json
